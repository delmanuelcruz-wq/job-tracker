<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deli's Job Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #000000;
      --bg1:      #0a0a0a;
      --bg2:      #111111;
      --bg3:      #1a1a1a;
      --border:   #222222;
      --border2:  #2a2a2a;
      --text:     #f0f0f0;
      --muted:    #666666;
      --muted2:   #444444;

      --green:    #00ff88;
      --green-d:  #00cc6a;
      --green-glow: 0 0 12px rgba(0,255,136,0.4);
      --green-glow2: 0 0 24px rgba(0,255,136,0.2);

      --purple:   #bf00ff;
      --purple-d: #9900cc;
      --purple-glow: 0 0 12px rgba(191,0,255,0.5);

      --cyan:     #00e5ff;
      --cyan-glow: 0 0 12px rgba(0,229,255,0.45);

      --pink:     #ff0080;
      --pink-glow: 0 0 12px rgba(255,0,128,0.45);

      --yellow:   #ffee00;
      --yellow-glow: 0 0 12px rgba(255,238,0,0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg1); }
    ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

    /* ── LAYOUT ── */
    .wrap { max-width: 1440px; margin: 0 auto; padding: 0 24px; }

    /* ── HEADER ── */
    .hdr {
      background: var(--bg1);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
      position: sticky; top: 0; z-index: 100;
    }
    .hdr-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }

    .logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px; font-weight: 600;
      color: var(--green);
      text-shadow: var(--green-glow);
      white-space: nowrap;
      letter-spacing: -0.5px;
    }
    .logo span { color: var(--text); opacity: 0.5; }

    .greeting {
      font-size: 11px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.5px;
    }
    .greeting em { color: var(--green); font-style: normal; }

    .nav { display: flex; gap: 2px; background: var(--bg2); padding: 3px; border-radius: 8px; border: 1px solid var(--border); flex-wrap: wrap; }
    .nav-btn {
      padding: 6px 13px; border-radius: 6px; border: none;
      background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
      font-family: 'Space Grotesk', sans-serif;
    }
    .nav-btn:hover { color: var(--text); background: var(--bg3); }
    .nav-btn.active {
      background: var(--bg3);
      color: var(--green);
      box-shadow: inset 0 0 0 1px rgba(0,255,136,0.25), var(--green-glow2);
    }
    .fu-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--pink); color: #000;
      font-size: 9px; font-weight: 700; margin-left: 4px;
    }

    /* ── BUTTONS ── */
    .btn {
      padding: 8px 16px; border-radius: 7px; border: none;
      font-size: 12.5px; font-weight: 600; cursor: pointer;
      transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Space Grotesk', sans-serif; line-height: 1;
    }
    .btn-primary {
      background: transparent;
      color: var(--green);
      border: 1px solid rgba(0,255,136,0.4);
      box-shadow: var(--green-glow2);
    }
    .btn-primary:hover {
      background: rgba(0,255,136,0.08);
      box-shadow: var(--green-glow);
      border-color: var(--green);
    }
    .btn-secondary { background: var(--bg3); color: var(--muted); border: 1px solid var(--border2); }
    .btn-secondary:hover { color: var(--text); border-color: var(--muted2); }
    .btn-danger { background: transparent; color: var(--pink); border: 1px solid rgba(255,0,128,0.25); }
    .btn-danger:hover { background: rgba(255,0,128,0.08); box-shadow: var(--pink-glow); }
    .btn-sm { padding: 5px 11px; font-size: 12px; border-radius: 6px; }
    .btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 5px; }

    /* ── MAIN ── */
    .main { padding: 22px 0 48px; }

    /* ── STAT GRID ── */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(138px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat-card {
      background: var(--bg1);
      border-radius: 10px; padding: 16px;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    .stat-card:hover { border-color: var(--border2); }
    .stat-lbl { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
    .stat-val { font-size: 26px; font-weight: 700; line-height: 1; margin-bottom: 3px; font-family: 'JetBrains Mono', monospace; }
    .stat-sub { font-size: 10.5px; color: var(--muted); }

    /* ── CARD ── */
    .card { background: var(--bg1); border-radius: 12px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px; }
    .card-hdr { padding: 13px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
    .card-hdr h2 { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--text); }
    .card-hdr.clickable { cursor: pointer; user-select: none; }
    .card-hdr.clickable:hover h2 { color: var(--green); }
    .card-body { padding: 18px; }

    /* ── PIPELINE ── */
    .pipe-grid { display: flex; gap: 16px; flex-wrap: wrap; }
    .pipe-item { min-width: 120px; flex: 1; }
    .pipe-lbl { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--muted); margin-bottom: 5px; }
    .pipe-lbl .fw { font-weight: 600; color: var(--text); }
    .prog-bar { height: 4px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }

    /* ── TABLE ── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th {
      padding: 9px 12px; text-align: left;
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px;
      background: var(--bg2); border-bottom: 1px solid var(--border);
      white-space: nowrap; cursor: pointer; user-select: none;
      font-family: 'JetBrains Mono', monospace;
    }
    thead th:hover { color: var(--green); }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--bg2); }
    tbody td { padding: 10px 12px; color: var(--text); vertical-align: middle; }
    .co-name { font-weight: 700; font-size: 13px; }
    .ref-tag { font-size: 10px; color: var(--green); margin-top: 2px; }
    .silent-ok { color: var(--muted); }
    .silent-warn { color: var(--yellow); font-weight: 600; }
    .silent-urgent { color: var(--pink); font-weight: 700; text-shadow: var(--pink-glow); }

    /* ── BADGES ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 20px;
      font-size: 10px; font-weight: 700; white-space: nowrap;
      line-height: 1.5; border: 1px solid transparent;
      font-family: 'JetBrains Mono', monospace;
    }
    .b-green  { color: var(--green);  border-color: rgba(0,255,136,0.3); background: rgba(0,255,136,0.07); }
    .b-yellow { color: var(--yellow); border-color: rgba(255,238,0,0.3); background: rgba(255,238,0,0.07); }
    .b-red    { color: var(--pink);   border-color: rgba(255,0,128,0.3); background: rgba(255,0,128,0.07); }
    .b-blue   { color: var(--cyan);   border-color: rgba(0,229,255,0.3); background: rgba(0,229,255,0.07); }
    .b-purple { color: var(--purple); border-color: rgba(191,0,255,0.3); background: rgba(191,0,255,0.07); }
    .b-gray   { color: var(--muted);  border-color: var(--border2); background: var(--bg2); }
    .b-orange { color: #ff8800;       border-color: rgba(255,136,0,0.3); background: rgba(255,136,0,0.07); }
    .b-fu     { color: var(--pink);   border-color: rgba(255,0,128,0.4); background: rgba(255,0,128,0.1); text-shadow: var(--pink-glow); animation: pulse 2s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

    /* ── SCORE DOTS ── */
    .dots { display: flex; gap: 3px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-on  { background: var(--green); box-shadow: 0 0 5px rgba(0,255,136,0.6); }
    .dot-off { background: var(--bg3); border: 1px solid var(--border2); }

    /* ── FILTER BAR ── */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .filter-bar input, .filter-bar select {
      padding: 7px 11px; border: 1px solid var(--border);
      border-radius: 7px; font-size: 12px; color: var(--text);
      background: var(--bg1); outline: none; font-family: 'Space Grotesk', sans-serif;
    }
    .filter-bar input:focus, .filter-bar select:focus {
      border-color: rgba(0,255,136,0.4);
      box-shadow: 0 0 0 3px rgba(0,255,136,0.06);
    }
    .filter-bar select option { background: var(--bg2); }

    /* ── MODAL ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      background: var(--bg1); border-radius: 14px;
      width: 100%; max-width: 720px; max-height: 92vh; overflow-y: auto;
      border: 1px solid var(--border2);
      box-shadow: 0 0 60px rgba(0,255,136,0.06), 0 24px 64px rgba(0,0,0,0.8);
    }
    .modal-hdr {
      padding: 16px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--bg1); z-index: 1;
    }
    .modal-hdr h2 { font-size: 15px; font-weight: 700; color: var(--green); text-shadow: var(--green-glow2); }
    .modal-body { padding: 22px; }

    /* ── FORMS ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
    .fg { display: flex; flex-direction: column; gap: 5px; }
    .fg.full { grid-column: 1 / -1; }
    label { font-size: 10.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; font-family: 'JetBrains Mono', monospace; }
    input[type=text], input[type=number], input[type=date], select, textarea {
      padding: 8px 11px; border: 1px solid var(--border);
      border-radius: 7px; font-size: 12.5px; color: var(--text);
      background: var(--bg2); outline: none; transition: all 0.15s;
      font-family: 'Space Grotesk', sans-serif; width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      border-color: rgba(0,255,136,0.4);
      box-shadow: 0 0 0 3px rgba(0,255,136,0.06);
    }
    select option { background: var(--bg2); }
    textarea { resize: vertical; min-height: 68px; }
    input[type=checkbox] { accent-color: var(--green); width: 14px; height: 14px; cursor: pointer; }
    .check-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--muted); cursor: pointer; font-weight: 500; }
    .score-btns { display: flex; gap: 5px; padding-top: 2px; }
    .score-btn {
      width: 30px; height: 30px; border-radius: 6px;
      border: 1px solid var(--border2); background: var(--bg2);
      color: var(--muted); font-weight: 700; font-size: 12px; cursor: pointer; transition: all 0.12s;
    }
    .score-btn.on {
      border-color: var(--green); background: rgba(0,255,136,0.1);
      color: var(--green); box-shadow: var(--green-glow2);
    }
    .form-section-title {
      font-size: 10px; font-weight: 700; color: var(--green);
      text-transform: uppercase; letter-spacing: 1px;
      grid-column: 1/-1; margin-top: 6px; padding-bottom: 6px;
      border-bottom: 1px solid rgba(0,255,136,0.15);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── FOLLOW-UP ── */
    .fu-card { border: 1px solid var(--border); border-radius: 9px; padding: 13px; margin-bottom: 9px; background: var(--bg2); }
    .fu-card.urgent { border-color: rgba(255,0,128,0.35); background: rgba(255,0,128,0.04); }
    .fu-card.warm   { border-color: rgba(255,238,0,0.3); background: rgba(255,238,0,0.03); }
    .tmpl-block {
      background: var(--bg);
      border-left: 2px solid var(--green);
      border-radius: 0 7px 7px 0; padding: 12px 14px;
      font-size: 11px; line-height: 1.7; color: var(--muted);
      white-space: pre-wrap; margin-top: 10px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── INSIGHTS ── */
    .insight-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); gap: 12px; }
    .insight-row:last-child { border-bottom: none; }
    .rec-card { padding: 14px 16px; background: var(--bg2); border-radius: 9px; border-left: 2px solid var(--green); margin-bottom: 11px; }
    .rec-q { font-weight: 700; font-size: 12.5px; color: var(--text); margin-bottom: 5px; }
    .rec-a { font-size: 12px; color: var(--muted); line-height: 1.65; }

    /* ── OFFER ── */
    .offer-summary {
      display: flex; gap: 20px; flex-wrap: wrap; margin-top: 14px;
      padding: 16px; background: var(--bg2); border-radius: 10px;
      border: 1px solid rgba(0,255,136,0.2);
      box-shadow: 0 0 30px rgba(0,255,136,0.04);
    }
    .offer-num { display: flex; flex-direction: column; gap: 4px; }
    .offer-lbl { font-size: 9.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; font-family: 'JetBrains Mono', monospace; }
    .offer-val { font-size: 20px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

    /* ── COLLAPSIBLE ── */
    .chev { display: inline-block; transition: transform 0.2s; color: var(--muted); font-size: 13px; }
    .chev.open { transform: rotate(180deg); }

    /* ── SECTION LABEL ── */
    .section-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 11px; font-family: 'JetBrains Mono', monospace; }

    /* ── MISC ── */
    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .text-muted { color: var(--muted); }
    .text-sm { font-size: 12px; }
    .fw6 { font-weight: 600; }
    .fw7 { font-weight: 700; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .mt16 { margin-top: 16px; }
    .mb12 { margin-bottom: 12px; }

    .alert-banner {
      padding: 10px 15px; border-radius: 9px; font-size: 12.5px;
      display: flex; align-items: center; gap: 10px; margin-bottom: 13px;
    }
    .alert-pink { background: rgba(255,0,128,0.07); border: 1px solid rgba(255,0,128,0.3); color: #ff80b5; }
    .alert-green { background: rgba(0,255,136,0.05); border: 1px solid rgba(0,255,136,0.25); color: var(--green); }

    /* ── GLOW DIVIDER ── */
    .glow-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,255,136,0.4), transparent);
      margin: 20px 0;
    }

    /* ── SCANLINE EFFECT (subtle) ── */
    .hdr::after {
      content: '';
      position: absolute; bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, var(--green) 50%, transparent 100%);
      opacity: 0.3;
    }

    @media (max-width: 800px) {
      .form-grid { grid-template-columns: 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
